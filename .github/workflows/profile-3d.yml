name: Generate 3D contribution graph

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-3d.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Generate 3D contribution assets
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit refreshed contribution assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          if git diff --cached --quiet; then
            echo "No contribution changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh 3D contribution graph"
          git push
